# StockSage 全局配置

llm:
  default: deepseek-chat
  temperature: 0.7
  max_tokens: 2000
  timeout: 30

workflow:
  max_debate_rounds: 3
  parallel_timeout: 60
  enable_mcp: true
  parallel_fetch: true

data:
  default_market: cn
  price_days: 60
  fallback_enabled: true
  cache_ttl:
    price: 14400      # 4小时
    financial: 86400   # 24小时
    news: 1800         # 30分钟
    fund_flow: 3600    # 1小时
    sentiment: 3600    # 1小时
    margin: 86400      # 24小时
    northbound: 3600   # 1小时
    balance_sheet: 86400  # 24小时

skills_dir: skills
mcp_config: config/mcp_servers.yaml
