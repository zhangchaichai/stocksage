# StockSage v3.0 深度基本面工作流
# 侧重基本面、估值与行业分析
# 适合价值投资者的深度研究

name: deep_fundamental
version: "3.0.0"
description: "深度基本面分析 — 基本面 + 估值 + 行业 + 风险 + 研报输出"

state:
  meta:
    type: dict
    merge: overwrite
  data:
    type: dict
    merge: deep_merge
  analysis:
    type: dict
    merge: deep_merge
  decision:
    type: dict
    merge: overwrite
  report:
    type: dict
    merge: overwrite
  portfolio:
    type: dict
    merge: overwrite
  errors:
    type: list
    merge: append
  current_phase:
    type: str
    merge: overwrite
  llm_traces:
    type: dict
    merge: deep_merge

nodes:
  # Phase 1: 数据采集
  - name: collect_data
    skill: collect_data
    type: custom

  # Phase 2: 4 个基本面相关分析师（并行）
  - name: fundamental_analyst
    skill: fundamental_analyst
  - name: valuation_analyst
    skill: valuation_analyst
  - name: industry_analyst
    skill: industry_analyst
  - name: risk_analyst
    skill: risk_analyst

  # Phase 3: 决策法官
  - name: judge
    skill: judge

  # Phase 4: 研报撰写 + 组合建议（并行）
  - name: report_writer
    skill: report_writer
  - name: portfolio_advisor
    skill: portfolio_advisor

edges:
  # START → 数据采集
  - source: START
    target: collect_data
    type: serial

  # 数据采集 → 4 分析师 (并行)
  - source: collect_data
    target:
      - fundamental_analyst
      - valuation_analyst
      - industry_analyst
      - risk_analyst
    type: fan_out

  # 4 分析师 → 法官 (汇聚)
  - source: fundamental_analyst
    target: judge
    type: fan_in
  - source: valuation_analyst
    target: judge
    type: fan_in
  - source: industry_analyst
    target: judge
    type: fan_in
  - source: risk_analyst
    target: judge
    type: fan_in

  # 法官 → 研报 + 组合建议（并行）
  - source: judge
    target:
      - report_writer
      - portfolio_advisor
    type: fan_out

  # 研报 + 组合建议 → END (不需要汇聚，各自写不同 state key)
  - source: report_writer
    target: END
    type: serial
  - source: portfolio_advisor
    target: END
    type: serial

custom_nodes:
  collect_data: "engine._collect_data"
