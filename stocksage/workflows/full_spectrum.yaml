# StockSage v3.0 全维度分析工作流
# 介于 quick_analysis 和 courtroom_debate_v3 之间
# 9 个分析师全覆盖 + 直接决策 + 研报，无辩论和专家评审

name: full_spectrum
version: "3.0.0"
description: "全维度分析 — 9 个分析师全覆盖 + 决策 + 研报 + 组合建议"

state:
  meta:
    type: dict
    merge: overwrite
  data:
    type: dict
    merge: deep_merge
  analysis:
    type: dict
    merge: deep_merge
  decision:
    type: dict
    merge: overwrite
  report:
    type: dict
    merge: overwrite
  portfolio:
    type: dict
    merge: overwrite
  errors:
    type: list
    merge: append
  current_phase:
    type: str
    merge: overwrite
  llm_traces:
    type: dict
    merge: deep_merge

nodes:
  # Phase 1: 数据采集
  - name: collect_data
    skill: collect_data
    type: custom

  # Phase 2: 9 个分析师（全维度并行）
  - name: technical_analyst
    skill: technical_analyst
  - name: fundamental_analyst
    skill: fundamental_analyst
  - name: risk_analyst
    skill: risk_analyst
  - name: sentiment_analyst
    skill: sentiment_analyst
  - name: news_analyst
    skill: news_analyst
  - name: fund_flow_analyst
    skill: fund_flow_analyst
  - name: valuation_analyst
    skill: valuation_analyst
  - name: industry_analyst
    skill: industry_analyst
  - name: macro_analyst
    skill: macro_analyst

  # Phase 3: 决策法官
  - name: judge
    skill: judge

  # Phase 4: 研报 + 组合建议（并行）
  - name: report_writer
    skill: report_writer
  - name: portfolio_advisor
    skill: portfolio_advisor

edges:
  # START → 数据采集
  - source: START
    target: collect_data
    type: serial

  # 数据采集 → 9 分析师 (并行 fan-out)
  - source: collect_data
    target:
      - technical_analyst
      - fundamental_analyst
      - risk_analyst
      - sentiment_analyst
      - news_analyst
      - fund_flow_analyst
      - valuation_analyst
      - industry_analyst
      - macro_analyst
    type: fan_out

  # 9 分析师 → 法官 (fan-in)
  - source: technical_analyst
    target: judge
    type: fan_in
  - source: fundamental_analyst
    target: judge
    type: fan_in
  - source: risk_analyst
    target: judge
    type: fan_in
  - source: sentiment_analyst
    target: judge
    type: fan_in
  - source: news_analyst
    target: judge
    type: fan_in
  - source: fund_flow_analyst
    target: judge
    type: fan_in
  - source: valuation_analyst
    target: judge
    type: fan_in
  - source: industry_analyst
    target: judge
    type: fan_in
  - source: macro_analyst
    target: judge
    type: fan_in

  # 法官 → 研报 + 组合建议（并行）
  - source: judge
    target:
      - report_writer
      - portfolio_advisor
    type: fan_out

  # 研报 + 组合建议 → END
  - source: report_writer
    target: END
    type: serial
  - source: portfolio_advisor
    target: END
    type: serial

custom_nodes:
  collect_data: "engine._collect_data"
