# StockSage v1.0 宏观周期分析工作流
# 康波/美林/政策三维分析
# 适合关注宏观经济周期与行业轮动的投资者

name: macro_cycle_analysis
version: "1.0.0"
description: "宏观周期分析 — 康波/美林/政策三维分析"

state:
  meta:
    type: dict
    merge: overwrite
  data:
    type: dict
    merge: deep_merge
  analysis:
    type: dict
    merge: deep_merge
  decision:
    type: dict
    merge: overwrite
  errors:
    type: list
    merge: append
  current_phase:
    type: str
    merge: overwrite
  llm_traces:
    type: dict
    merge: deep_merge

nodes:
  # Phase 1: 数据采集
  - name: collect_data
    skill: collect_data
    type: custom

  # Phase 2: 4 个分析师（并行）
  - name: macro_analyst
    skill: macro_analyst
  - name: industry_analyst
    skill: industry_analyst
  - name: news_analyst
    skill: news_analyst
  - name: sector_strategist
    skill: sector_strategist

  # Phase 3: 综合讨论
  - name: synthesize
    skill: team_discussion

edges:
  # START -> 数据采集
  - source: START
    target: collect_data
    type: serial

  # 数据采集 -> 4 分析师 (并行 fan-out)
  - source: collect_data
    target:
      - macro_analyst
      - industry_analyst
      - news_analyst
      - sector_strategist
    type: fan_out

  # 4 分析师 -> 综合讨论 (fan-in)
  - source: macro_analyst
    target: synthesize
    type: fan_in
  - source: industry_analyst
    target: synthesize
    type: fan_in
  - source: news_analyst
    target: synthesize
    type: fan_in
  - source: sector_strategist
    target: synthesize
    type: fan_in

  # 综合讨论 -> END
  - source: synthesize
    target: END
    type: serial

custom_nodes:
  collect_data: "engine._collect_data"
