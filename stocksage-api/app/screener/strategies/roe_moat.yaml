id: roe_moat
name: 高ROE护城河
description: ROE>15% + 毛利率>40% + 净利润增速>10%，精选具备持续竞争优势的质量成长股
icon: "🏰"
category: 价值类
risk_level: 低
suitable_for: 长线（1-3个月）
pool: hs300

pywencai:
  enabled: true
  queries:
    - "净资产收益率大于15%，毛利率大于40%，净利润增长率大于10%，资产负债率小于60%，非ST，沪深A股，按ROE由大至小"
    - "ROE大于15%，毛利率大于40%，净利润增速大于10%，非ST，沪深A股"
    - "高ROE，毛利率高，净利润增速为正，非ST，沪深A股，按ROE排名"
    - "ROE大于12%，净利润增速为正，非ST，沪深A股，按ROE由大到小"
  top_n: 20
  sort_field: "ROE"
  sort_ascending: false

akshare_enrich:
  enabled: false
  required_fields: []

quant_signals:
  sell_conditions:
    - type: holding_days
      days: 60
      label: "持股满60天"
    - type: stop_loss
      pct: 0.10
      label: "止损10%"
    - type: take_profit
      pct: 0.30
      label: "止盈30%"

display_fields:
  - {field: close,     label: 最新价}
  - {field: roe,       label: ROE%}
  - {field: 毛利率,    label: 毛利率%}
  - {field: 净利润增长率, label: 净利增长%}
  - {field: pe,        label: PE}
  - {field: pb,        label: PB}
  - {field: 总市值,    label: 总市值(亿)}

exclude:
  - st: true

risk_params:
  max_position_ratio: 0.2
  max_holding_count: 8
  max_daily_buy: 2
  recommended_capital: 300000
