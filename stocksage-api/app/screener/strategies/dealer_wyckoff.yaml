id: dealer_wyckoff
name: 庄家吸筹
description: 基于 Wyckoff 理论，检测吸筹阶段信号：OBV背离 + 换手率溢价 + 成交量萎缩，需 AkShare 深度计算
icon: "🎯"
category: 特色策略
risk_level: 中
suitable_for: 中长线（1-2个月）
pool: all_a

# pywencai 不支持 Wyckoff 相关数据，使用 AkShare 两阶段模式
pywencai:
  enabled: false
  queries: []

akshare_enrich:
  enabled: true
  required_fields:
    - wyckoff_phase
    - obv_divergence
    - turnover_premium
    - main_net_flow_total
    - vol_ratio

quant_signals:
  buy_conditions:
    - field: wyckoff_phase
      operator: eq
      value: "accumulation"
      label: "Wyckoff吸筹阶段"

  sell_conditions:
    - type: holding_days
      days: 40
      label: "持股满40天"
    - type: stop_loss
      pct: 0.10
      label: "止损10%"
    - type: take_profit
      pct: 0.35
      label: "止盈35%"

display_fields:
  - {field: close,              label: 最新价}
  - {field: wyckoff_phase,      label: Wyckoff阶段}
  - {field: obv_divergence,     label: OBV背离}
  - {field: turnover_premium,   label: 换手溢价}
  - {field: main_net_flow_total, label: 主力净流入}
  - {field: vol_ratio,          label: 量比}

exclude:
  - st: true

risk_params:
  max_position_ratio: 0.25
  max_holding_count: 5
  max_daily_buy: 1
  recommended_capital: 200000
